# freezerMon Mosquitto configuration
listener 1883
protocol mqtt

# Authentication required — no anonymous access
allow_anonymous false
password_file /mosquitto/config/passwd

# Retained/queued message durability
persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type warning
log_type error

# --- TLS upgrade path (uncomment after placing certs, see README §Security) ---
# listener 8883
# certfile /mosquitto/config/certs/fullchain.pem
# keyfile  /mosquitto/config/certs/privkey.pem
