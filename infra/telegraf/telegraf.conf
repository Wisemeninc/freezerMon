# freezerMon — MQTT -> InfluxDB v2 pipeline
[agent]
  interval = "10s"
  flush_interval = "10s"
  omit_hostname = true

[[inputs.mqtt_consumer]]
  servers  = ["tcp://mosquitto:1883"]
  topics   = ["freezer/+/telemetry", "freezer/+/alert"]
  username = "${MQTT_USER}"
  password = "${MQTT_PASSWORD}"
  qos = 1
  persistent_session = true
  client_id = "telegraf-freezermon"
  data_format = "json_v2"

  # freezer/<device>/<telemetry|alert>  ->  measurement + device tag
  [[inputs.mqtt_consumer.topic_parsing]]
    topic       = "freezer/+/+"
    measurement = "_/_/measurement"
    tags        = "_/device/_"

  [[inputs.mqtt_consumer.json_v2]]
    [[inputs.mqtt_consumer.json_v2.object]]
      path             = "@this"
      timestamp_key    = "ts"
      timestamp_format = "unix"
      # NOTE: "wake" stays a field — as a tag it would split every telemetry
      # series per wake reason and fragment dashboard queries. "kind" is only
      # present on alert messages, where per-kind series are wanted.
      tags             = ["kind"]

[[outputs.influxdb_v2]]
  urls         = ["http://influxdb:8086"]
  token        = "${INFLUX_TOKEN}"
  organization = "${INFLUX_ORG}"
  bucket       = "${INFLUX_BUCKET}"
