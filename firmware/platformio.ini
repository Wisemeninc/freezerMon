; freezerMon — LilyGO T-A7608E-H (ESP32-WROVER-E + SIMCom A7608E-H)
;   pio run -e t-a7608          plain MQTT (port 1883)
;   pio run -e t-a7608-tls      MQTT over TLS (set MQTT_PORT 8883 in config.h)
[platformio]
default_envs = t-a7608

[env]
platform = espressif32@6.7.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DTINY_GSM_RX_BUFFER=1024
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=2
lib_deps =
    ; stock TinyGSM has no A76XX support — LilyGO-maintained fork is required
    https://github.com/lewisxhe/TinyGSM.git
    knolleary/PubSubClient@^2.8
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0
    bblanchon/ArduinoJson@^7.1.0

[env:t-a7608]
build_flags = ${env.build_flags} -DTINY_GSM_MODEM_A7608

[env:t-a7608-tls]
; the fork exposes TinyGsmClientSecure only via its A76xx SSL variant
build_flags = ${env.build_flags} -DTINY_GSM_MODEM_A76XXSSL -DUSE_TLS

[env:t-a7608-tls-debug]
; TLS build + full AT-command dump on serial — bench diagnosis only
build_flags = ${env.build_flags} -DTINY_GSM_MODEM_A76XXSSL -DUSE_TLS -DTINY_GSM_DEBUG=Serial
